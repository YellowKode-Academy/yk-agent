server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # RAG API — must be before /api/agent/ and /api/ollama/
    location /api/rag/ {
        proxy_pass http://rag-api:3002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        client_max_body_size 50m;
    }

    # Proxy Agent API (LLM + browser tool loop)
    location /api/agent/ {
        proxy_pass http://agent-api:8080/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_connect_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Accel-Buffering no;
    }

    # Proxy Ollama (for model status / tags only)
    location /api/ollama/ {
        proxy_pass http://ollama:11434/api/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_set_header Host $host;
    }

    # Playwright MCP status
    location /api/playwright/ {
        proxy_pass http://playwright-mcp:8931/;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
    }

    # Static screenshots from browser sessions
    location /screenshots/ {
        alias /var/www/screenshots/;
        add_header Cache-Control "public, max-age=86400";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
